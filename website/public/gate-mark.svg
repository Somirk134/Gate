<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gate logo">
  <defs>
    <linearGradient id="gate-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#151923" />
      <stop offset="100%" stop-color="#05070b" />
    </linearGradient>
    <linearGradient id="gate-stroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#42f8d3" />
      <stop offset="45%" stop-color="#34b7ff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="gate-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="gate-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#gate-bg)" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2" stroke-dasharray="12 14" />
  <circle cx="256" cy="256" r="102" fill="none" stroke="#42f8d3" stroke-opacity="0.08" stroke-width="2" />
  <path d="M316 152A120 120 0 1 0 376 256H256" fill="none" stroke="url(#gate-stroke)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" filter="url(#gate-shadow)" />
  <circle cx="256" cy="256" r="15" fill="#ffffff" filter="url(#gate-glow)" />
  <circle cx="256" cy="256" r="6" fill="#42f8d3" />
</svg>
