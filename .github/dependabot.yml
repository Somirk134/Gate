version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: ["dependencies", "rust"]
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
    labels: ["dependencies", "client"]
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels: ["dependencies", "docs"]
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    labels: ["dependencies", "github-actions"]
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 10
