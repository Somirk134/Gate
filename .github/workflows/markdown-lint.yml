name: Markdown Lint

on:
  push:
    branches: ["main", "master", "develop"]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !target/**
            !node_modules/**
            !website/node_modules/**
            !client/node_modules/**
