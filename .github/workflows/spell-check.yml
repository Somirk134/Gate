name: Spell Check

on:
  push:
    branches: ["main", "master", "develop"]
    paths:
      - "**/*.md"
      - "cspell.json"
      - ".github/workflows/spell-check.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "cspell.json"
      - ".github/workflows/spell-check.yml"

permissions:
  contents: read

jobs:
  cspell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run cspell
        run: npx cspell@latest "**/*.md" --config cspell.json --no-progress
