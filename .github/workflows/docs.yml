name: Documentation

on:
  push:
    branches: ["main", "master", "develop"]
    paths:
      - "docs/**"
      - "website/**"
      - "README.md"
      - "README.zh-CN.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - "README.md"
      - "README.zh-CN.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  vitepress:
    name: VitePress
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect VitePress site
        id: vitepress
        shell: bash
        run: |
          if [[ -f website/package.json && -f website/package-lock.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.vitepress.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        if: steps.vitepress.outputs.present == 'true'
        working-directory: website
        run: npm ci

      - name: Build documentation
        if: steps.vitepress.outputs.present == 'true'
        working-directory: website
        run: npm run docs:build

      - name: Skip VitePress build
        if: steps.vitepress.outputs.present != 'true'
        run: echo "No website/package.json found; skipping VitePress build."
