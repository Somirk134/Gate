name: Docker

on:
  workflow_dispatch:
    inputs:
      image:
        description: Docker image tag to publish
        required: true
        default: qwe1235/gate-server:0.9.2-http-boundary-rc1
        type: string
      push:
        description: Push image to DockerHub
        required: true
        default: true
        type: boolean
  push:
    branches: ['main', 'master']
    paths:
      - 'docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'server/**'
      - 'crates/**'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'server/**'
      - 'crates/**'
      - '.github/workflows/docker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build server image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub token
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::发布 DockerHub 镜像需要配置 DOCKERHUB_TOKEN 仓库密钥。"
            exit 1
          fi

      - name: Login to DockerHub
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
        uses: docker/login-action@v3
        with:
          username: qwe1235
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
          tags: ${{ github.event_name == 'workflow_dispatch' && inputs.image || 'gate-server:ci' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
