name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  server:
    name: Server ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gate-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gate-server.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: gate-server
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Build server
        run: cargo build -p gate-server --release --target ${{ matrix.target }}

      - name: Package server
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          tar -czf "dist/gate-server-${{ matrix.target }}.tar.gz" -C dist "${{ matrix.binary }}"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate-server-${{ matrix.target }}
          path: dist/gate-server-${{ matrix.target }}.tar.gz

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.repository_owner != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gate-server:${{ github.ref_name }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [server, docker]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.tar.gz
