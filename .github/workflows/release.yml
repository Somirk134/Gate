name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-server:
    name: Build Server (${{ matrix.target }})
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - aarch64-apple-darwin
    runs-on: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-latest' || matrix.target == 'x86_64-pc-windows-msvc' && 'windows-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build -p gate-server --release --target ${{ matrix.target }}

      - name: Archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf gate-server-${{ matrix.target }}.tar.gz gate-server${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

      - uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/gate-server-*.tar.gz

  build-client:
    name: Build Client
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install
        working-directory: client

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tagName: ${{ github.ref_name }}
          releaseName: "Gate v${{ github.ref_name }}"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          args: --bundles deb,appimage,msi,nsis,dmg
