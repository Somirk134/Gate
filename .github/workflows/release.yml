name: Release

on:
  push:
    tags:
      - "v0.9.0-beta*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 20

jobs:
  validate:
    name: Validate release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix client ci

      - name: Rust check
        run: cargo check --workspace

      - name: Rust test
        run: cargo test --workspace

      - name: Rust build
        run: cargo build --workspace

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_glob: |
              target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            bundles: dmg
            artifact_glob: |
              target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              client/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            artifact_glob: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            artifact_glob: |
              target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix client ci

      - name: Build Tauri package
        run: npm --prefix client run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload desktop package
        uses: actions/upload-artifact@v4
        with:
          name: gate-desktop-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Gate v0.9.0 Beta
          draft: true
          generate_release_notes: true
          files: dist/**
