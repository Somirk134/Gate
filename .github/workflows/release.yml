name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v0.9.2)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 20
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ''
          cache: true
          cache-key: release-validate-ubuntu-22.04-v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix client ci

      - name: Validate release version
        run: node scripts/release/validate-release-version.mjs "${RELEASE_TAG}"

      - name: Release data guard
        run: npm run guard:release-data

      - name: Test release manifests
        run: npm run test:release-manifest

      - name: Rust check
        run: cargo check --workspace

      - name: Rust test
        run: cargo test --workspace

      - name: Rust build
        run: cargo build --workspace

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            bundles: app,dmg
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          rustflags: ''
          cache: true
          cache-key: release-${{ matrix.name }}-v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix client ci

      - name: Release data guard
        run: npm run guard:release-data

      - name: Build Tauri package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm --prefix client run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build server binary
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p gate-server
          mkdir -p server-bin
          VERSION="${RELEASE_TAG}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/gate-server.exe" "server-bin/gate-server-${VERSION}-${{ matrix.name }}.exe"
          else
            cp "target/${{ matrix.target }}/release/gate-server" "server-bin/gate-server-${VERSION}-${{ matrix.name }}"
          fi

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: gate-server-${{ matrix.name }}
          path: server-bin/*
          if-no-files-found: error

      - name: Collect release assets and updater manifest
        shell: bash
        run: |
          mkdir -p updater release-assets
          echo "== bundle tree =="
          find target/${{ matrix.target }}/release client/src-tauri/target/${{ matrix.target }}/release \
            \( -name '*.sig' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.dmg' \) \
            2>/dev/null | head -80 || true
          node scripts/generate-platform-updater-manifest.mjs \
            "target/${{ matrix.target }}/release/bundle" \
            "client/src-tauri/target/${{ matrix.target }}/release/bundle" \
            --tag "${RELEASE_TAG}" \
            --platform "${{ matrix.name }}" \
            --out "updater/latest-${{ matrix.name }}-0.json" \
            --assets-out "release-assets"
          ls -R updater release-assets

      - name: Upload updater manifests
        uses: actions/upload-artifact@v4
        with:
          name: gate-updater-${{ matrix.name }}
          path: updater/
          if-no-files-found: error

      - name: Upload desktop package
        uses: actions/upload-artifact@v4
        with:
          name: gate-desktop-${{ matrix.name }}
          path: release-assets/
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          pattern: gate-desktop-*
          path: dist
          merge-multiple: true

      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          pattern: gate-server-*
          path: dist
          merge-multiple: true

      - name: Download updater manifests
        uses: actions/download-artifact@v4
        with:
          pattern: gate-updater-*
          path: updater
          merge-multiple: true

      - name: Merge updater manifests
        run: node scripts/merge-updater-manifests.mjs updater dist/latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Gate ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            dist/**
