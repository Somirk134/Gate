name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 20

jobs:
  validate:
    name: Validate release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

      - name: Client typecheck
        run: npm run typecheck

      - name: Client build
        run: npm run build

  server:
    name: Server ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gate-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gate-server.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: gate-server
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: gate-server
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Build server
        run: cargo build -p gate-server --release --target ${{ matrix.target }}

      - name: Package server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          tar -czf "dist/gate-server-${{ matrix.target }}.tar.gz" -C dist "${{ matrix.binary }}"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate-server-${{ matrix.target }}
          path: dist/gate-server-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: |
              client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
              client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: |
              client/src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: |
              client/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: |
              client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
              client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build Tauri desktop package
        run: npm --prefix client run tauri build -- --target ${{ matrix.target }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate-desktop-${{ matrix.name }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gate-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/gate-server:latest

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [server, desktop, docker]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**
