name: Documentation Issue
description: Report missing, confusing, or incorrect documentation.
title: "docs: "
labels: ["docs", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/quick-start.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
