[project]
name = "example-stack"
owner = "platform-team"
environment = "development"

[server]
address = "127.0.0.1:7000"
auth_token = "gate-alpha-token"

[[tunnels]]
name = "web"
protocol = "tcp"
local_host = "127.0.0.1"
local_port = 3000
remote_port = 18080

[[tunnels]]
name = "api"
protocol = "tcp"
local_host = "127.0.0.1"
local_port = 4000
remote_port = 18081
