events {}

http {
    access_log off;

    server {
        listen 127.0.0.1:8080;
        server_name static.example.com;

        location / {
            default_type text/plain;
            return 200 "gate nginx http example\n";
        }

        location /api/health {
            default_type application/json;
            return 200 '{"ok":true,"service":"nginx"}';
        }
    }
}
